<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <title>Modifier un membre</title>
    </head>
    <body>
        <h1>Modifier {{ member.firstname }} {{ member.lastname }}</h1>
        <p>Modifiez les informations de {{ member.firstname }} {{ member.lastname }}.</p>
        <form action="" method="post">
            {% csrf_token %}
            {{ form }}
            <p>{{ error }}</p>
            <input type="submit" value="Modifier"/>
        </form>
    </body>
</html>
