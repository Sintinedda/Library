<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <title>Modifier un item</title>
    </head>
    <body>
        <h1>Modifier le {{ cat }}, {{ item.name }}</h1>
        <p>Entrez les nouvelles informations de {{ item.name }}.</p>
        <form action="" method="post">
            {% csrf_token %}
            {{ form }}
            <p>{{ error }}</p>
            <input type="submit" value="Modifier"/>
        </form>
    </body>
</html>
